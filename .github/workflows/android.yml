name: Android Debug APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --force

      - name: Build web app (Static Export)
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      # ADDED: Clean the Gradle cache to prevent "Failed to create Jar file" errors
      - name: Clean Gradle Cache
        run: rm -rf ~/.gradle/caches/

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          # ADDED: --no-daemon and memory flags to prevent process crashes
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: almudata-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk